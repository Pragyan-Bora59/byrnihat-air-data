name: Hourly AQICN Data Collection

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-aqicn-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests python-dotenv

      - name: Run AQICN data collection script
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
        run: |
          python Record_AQICNdata.py

      - name: Show AQICN CSV row counts
        run: |
          echo "Raw fetch log:"
          wc -l data/raw/aqicn_fetch_log.csv || true

          echo "Processed observation files:"
          wc -l data/processed/*.csv || true

