name: Record AQICN data hourly

on:
  schedule:
    # GitHub uses UTC time.
    # These four schedules give GitHub 4 chances per hour.
    # In India, they run around :37, :52, :07, and :22 IST.
    - cron: "7 * * * *"
    - cron: "22 * * * *"
    - cron: "37 * * * *"
    - cron: "52 * * * *"

  # This keeps the manual "Run workflow" button.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record-data:
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger info
        run: |
          echo "Workflow started"
          echo "Triggered by: ${{ github.event_name }}"
          date -u

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AQICN data collection script
        run: |
          python Record_AQICNdata.py

      - name: Check data folder after script
        run: |
          echo "Checking data folder:"
          ls -la data || echo "data folder not found"

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Update AQICN air quality data"
            git push
          fi


    
