name: Record AQICN data hourly

on:
  schedule:
    # GitHub uses UTC time.
    # These 4 timings give GitHub multiple chances per hour.
    # In IST, they roughly correspond to :37, :52, :07, and :22.
    - cron: "7 * * * *"
    - cron: "22 * * * *"
    - cron: "37 * * * *"
    - cron: "52 * * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aqicn-data-recording
  cancel-in-progress: false

jobs:
  record-data:
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger information
        run: |
          echo "Workflow started"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Current UTC time:"
          date -u

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Current folder:"
          pwd
          echo "Repository files:"
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AQICN data collection script
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
        run: |
          python Record_AQICNdata.py

      - name: Check data folder after script
        run: |
          echo "Checking data folder after running Python script:"
          ls -la data || echo "data folder not found"

      - name: Show AQICN CSV row counts
        run: |
          python - << 'PY'
